name: Build Targets

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-macos:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/rust-cross/cargo-zigbuild:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS x86_64
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - label: macOS arm64
            target: aarch64-apple-darwin
            archive_ext: tar.gz
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cd-macos-${{ matrix.target }}
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.target }}
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/zipbit11 dist/zipbit11
          tar -C dist -czf zipbit11-${{ matrix.target }}.${{ matrix.archive_ext }} zipbit11
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: zipbit11-${{ matrix.target }}
          path: zipbit11-${{ matrix.target }}.${{ matrix.archive_ext }}

  build-linux:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - label: Linux aarch64
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - label: Linux armhf
            target: armv7-unknown-linux-gnueabihf
            use_cross: true
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cd-linux-${{ matrix.target }}
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        run: cargo install --locked cross
      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/zipbit11 dist/zipbit11
          tar -C dist -czf zipbit11-${{ matrix.target }}.tar.gz zipbit11
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: zipbit11-${{ matrix.target }}
          path: zipbit11-${{ matrix.target }}.tar.gz

  build-windows:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    env:
      XWIN_CACHE_DIR: /home/runner/.xwin-cache
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x86
            target: i686-pc-windows-msvc
            xwin_arch: x86
          - label: Windows x86_64
            target: x86_64-pc-windows-msvc
            xwin_arch: x86_64
          - label: Windows arm64
            target: aarch64-pc-windows-msvc
            xwin_arch: aarch64
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: cd-windows-${{ matrix.target }}
          cache-directories: |
            /home/runner/.xwin-cache
      - name: Install LLVM
        run: sudo apt-get update && sudo apt-get install -y clang lld
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - name: Install cargo-xwin
        run: cargo install --locked cargo-xwin
      - name: Pre-cache Windows SDK
        env:
          XWIN_ACCEPT_LICENSE: "1"
        run: cargo xwin cache xwin --xwin-arch ${{ matrix.xwin_arch }}
      - name: Build
        env:
          XWIN_ACCEPT_LICENSE: "1"
        run: cargo xwin build --release --target ${{ matrix.target }} --xwin-arch ${{ matrix.xwin_arch }}
      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/zipbit11.exe dist/zipbit11.exe
          cd dist
          zip ../zipbit11-${{ matrix.target }}.zip zipbit11.exe
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: zipbit11-${{ matrix.target }}
          path: zipbit11-${{ matrix.target }}.zip

  publish-release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-linux
      - build-windows
    steps:
      - uses: actions/checkout@v5
      - name: Download workflow artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          rm -rf dist
          mkdir -p dist/raw
          gh run download "${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            --pattern "zipbit11-*" \
            --dir dist/raw
          find dist/raw -type f -exec cp {} dist/ \;
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*
